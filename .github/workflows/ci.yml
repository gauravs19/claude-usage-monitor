name: Code Robustness (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type Check (TSC)
        run: npm run compile
      - name: Build extension
        run: npm run build
      - name: Linting
        run: npm run lint
      - name: Run Tests
        run: npm test
